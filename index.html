<script>
  const entradaInput = document.getElementById("entrada");
  const saidaInput = document.getElementById("saida");

function formatarMoeda(valor) {
  valor = valor.replace(/\D/g, ""); // remove tudo que não é número
  valor = (valor / 100).toFixed(2) + "";
  valor = valor.replace(".", ",");

  valor = valor.replace(/\B(?=(\d{3})+(?!\d))/g, ".");

  return "R$ " + valor;
}

entradaInput.addEventListener("input", () => {
  entradaInput.value = formatarMoeda(entradaInput.value);
});

saidaInput.addEventListener("input", () => {
  saidaInput.value = formatarMoeda(saidaInput.value);
});
</script>

 <button id="btnCopiar" onclick="copiarTexto()">📋 Copiar mensagem</button>
  <!-- Essa parte é para o script de cópia -->
  <script>
  function copiarTexto() {
  const texto = document.getElementById("resultado").innerText;

  navigator.clipboard.writeText(texto)
    .then(() => {
      alert("Texto copiado com sucesso! 😎");
    })
    .catch(() => {
      alert("Erro ao copiar 😢");
    });
}
</script>
  <script>
    const paciente = document.getElementById("paciente");
    const clinica = document.getElementById("clinica");
    const exame = document.getElementById("exame");
    const data = document.getElementById("datatexto");
    const hora = document.getElementById("hora");
    const entrada = document.getElementById("entrada");
    const saida = document.getElementById("saida");
    const resultado = document.getElementById("resultado");

   
    function atualizarTexto() {
      const datatexto = data.value || "...";

      resultado.innerHTML = `
*Confirmação de AGENDAMENTO* ✅

👤 Paciente: *${paciente.value || "..."}*
🏥 Nome da Clínica: *${clinica.value}*
🧪 Procedimento: *${exame.value || "..."}*
🗓️ Dia e horário: *${datatexto}* | *${hora.value || "..."}*

*💰Formas de pagamento:*
Para confirmação do agendamento é necessário o pagamento de entrada de *${entrada.value || "..."}*(valor abatido) à DR. EXAME via:

> *⚡ Pix - Chave CNPJ: 45323648000137 (DR EXAME ONLINE)*
> 💳 *Cartão de crédito*
> 📄 *Boleto*

📍 O valor restante *${saida.value || "..."}* será pago na clínica no dia do exame.
      `;
    }

    // Atualização em tempo real
    paciente.addEventListener("input", atualizarTexto);
    clinica.addEventListener("input", atualizarTexto);
    exame.addEventListener("input", atualizarTexto);
    data.addEventListener("input", atualizarTexto);
    hora.addEventListener("input", atualizarTexto);
    entrada.addEventListener("input", atualizarTexto);
    saida.addEventListener("input", atualizarTexto);

    // Inicializa já com vazio
    atualizarTexto();
  </script>
